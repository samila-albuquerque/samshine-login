<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>SamShine — Login</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo-container">
      <span class="icon-box">s</span>
      <span class="brand-name">Books | Flowers</span>
    </div>
  </header>

  <!-- CONTEÚDO PRINCIPAL -->
  <main>
    <div class="login-card">
      <div class="user-avatar">
        <img src="./Bookstore Banner in Dark Green Yellow Floral Style.png"
        alt="Usuário">
    </div>
    
    <h1>SamShine</h1>
    <p>May your book be as good as the smell of flowers</p>
    <h2>Faça seu login e sinta seu dia florescer</h2>

      <!-- FORMULÁRIO -->
      <form>
        <div class="field">
          <label for="email">E-mail</label>
            <input type="email" id="email"
            placeholder="seu@email.com">
            <p id="email-helper" class="helper-text">Email obrigatório</p>
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input type="password" 
          id="senha" placeholder="Sua senha">
          <p id="senha-helper" class="helper-text">Senha obrigatória</p>
        </div>

        <button
        type="submit">Entrar</button>
      </form>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2025 SamShine &mdash; Todos os direitos reservados</p>
  </footer>
<script src="script.js"></script>

</body>
</html>
